# -----------------------------------------------
# NIA Monitoring — endpoint stack (Raspberry Pi)
# Canonical template: monitoring-nia-pi/template/endpoint/
# Deploy copy: docker-slice-pi
# Scrapes: local Prometheus Agent → Cherry remote_write over Tailscale
# Optional: cloudflared (profile tunnel) for debug hostnames
# -----------------------------------------------
name: slice-pi

# -----------------------------------------------
# Networks (project-scoped — do not pin bare names)
# -----------------------------------------------
networks:
  frontend:
  backend:

# -----------------------------------------------
# Volumes
# -----------------------------------------------
volumes:
  NSD_prometheus_agent_data:
  NSD_speedtest_tracker_data:

# -----------------------------------------------
# Shared service defaults
# -----------------------------------------------
x-restart: &restart_policy
  restart: unless-stopped

# -----------------------------------------------
# Services
# -----------------------------------------------
services:
  # -------------- prometheus-agent --------------
  # Scrapes this stream package and remote_writes samples to Cherry.
  prometheus:
    <<: *restart_policy
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.13.1}
    entrypoint:
      - /bin/sh
      - /etc/prometheus/render-agent-config.sh
    environment:
      - HOST_ID=${HOST_ID:?HOST_ID is required}
      - WP_PRIMARY_URL=${WP_PRIMARY_URL:?WP_PRIMARY_URL is required}
      - WP_SECONDARY_URL=${WP_SECONDARY_URL:?WP_SECONDARY_URL is required}
      - REMOTE_WRITE_URL=${REMOTE_WRITE_URL:-http://cherry.taild08b87.ts.net:9090/api/v1/write}
    volumes:
      - ./prometheus/prometheus.agent.yml.tmpl:/etc/prometheus/prometheus.agent.yml.tmpl:ro
      - ./prometheus/render-agent-config.sh:/etc/prometheus/render-agent-config.sh:ro
      - NSD_prometheus_agent_data:/prometheus-agent
    depends_on:
      - node_exporter
      - blackbox_exporter
      - speedtest-tracker
      - json_exporter
    networks:
      - frontend

  # ---------------- json_exporter ---------------
  # Converts Blackmagic Web Presenter REST JSON into Prometheus metrics.
  json_exporter:
    <<: *restart_policy
    image: quay.io/prometheuscommunity/json-exporter:${JSON_EXPORTER_VERSION:-v0.7.0}
    command:
      - --config.file=/config.yml
    volumes:
      - ./json_exporter/config.yml:/config.yml:ro
    networks:
      - frontend

  # ----------------- cloudflared -----------------
  # Optional — scrapes use Tailscale / remote_write, not the tunnel.
  cloudflared:
    <<: *restart_policy
    profiles:
      - tunnel
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-2026.7.1}
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    networks:
      - frontend

  # --------------- node_exporter -----------------
  # Published on the host for local debug / Tailscale checks.
  # Restrict with Tailscale ACLs / host firewall (not public internet).
  node_exporter:
    <<: *restart_policy
    image: quay.io/prometheus/node-exporter:${NODE_EXPORTER_VERSION:-v1.12.0}
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - frontend

  # ------------- blackbox_exporter ---------------
  blackbox_exporter:
    <<: *restart_policy
    image: quay.io/prometheus/blackbox-exporter:${BLACKBOX_EXPORTER_VERSION:-v0.28.0}
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    cap_add:
      - NET_RAW
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - frontend

  # -------------- speedtest-tracker --------------
  # UI + /prometheus on :8765; Prometheus Agent scrapes over Compose DNS.
  speedtest-tracker:
    <<: *restart_policy
    image: lscr.io/linuxserver/speedtest-tracker:${SPEEDTEST_TRACKER_VERSION:-1.14.5}
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Dublin}
      - APP_KEY=${SPEEDTEST_APP_KEY:?SPEEDTEST_APP_KEY is required}
      - APP_URL=http://${HOST_ID}.taild08b87.ts.net:${SPEEDTEST_PORT:-8765}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE=${SPEEDTEST_SCHEDULE:-0 */6 * * *}
      - SPEEDTEST_SERVERS=${SPEEDTEST_SERVERS:-}
      - DISPLAY_TIMEZONE=${TZ:-Europe/Dublin}
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_ALLOWED_IPS=0.0.0.0/0


    volumes:
      - NSD_speedtest_tracker_data:/config
    ports:
      - "${SPEEDTEST_PORT:-8765}:80"
    networks:
      - frontend
